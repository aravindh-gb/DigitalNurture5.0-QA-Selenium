{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-body">

                <h2 class="mb-4">Register</h2>

                <form method="POST">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success">
                        Register
                    </button>

                    <a href="{% url 'login' %}" class="btn btn-secondary">
                        Login
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
